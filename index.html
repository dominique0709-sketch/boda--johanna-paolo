<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boda Johanna & Paolo</title>

<style>
body{
margin:0;
font-family: 'Georgia', serif;
background:#f4efe8;
color:#4a4a4a;
text-align:center;
overflow-x:hidden;
}

/* Secciones */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px 20px;
}

/* Corazón fino */
.heart{
font-size:70px;
cursor:pointer;
animation:latido 1.8s infinite;
color:#b8a38f;
}

@keyframes latido{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

.hidden{display:none;}

/* Carta */
.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
max-width:350px;
}

.button{
margin-top:20px;
padding:12px 28px;
border:none;
background:#b8a38f;
color:white;
border-radius:30px;
font-size:15px;
cursor:pointer;
}

.button:hover{
background:#a68f7b;
}

.hero{
